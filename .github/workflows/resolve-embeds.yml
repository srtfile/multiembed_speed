name: resolve-embeds

on:
  workflow_dispatch:
    inputs:
      video_ids:
        description: "Space-separated multiembed video_ids  e.g.  280 550 12345"
        required: false
        default: "280"
      raw_urls:
        description: "Extra raw URLs (newline-safe, one per line)"
        required: false
      output_artifact:
        description: "Upload results as artifact? (true/false)"
        required: false
        default: "true"

  schedule:
    - cron: "0 4 * * *"

  push:
    branches: [main]
    paths:
      - "fast_embed.py"
      - ".github/workflows/resolve-embeds.yml"

jobs:
  resolve:
    name: Resolve embed URLs
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ runner.os }}-aiohttp-uvloop
          restore-keys: pip-${{ runner.os }}-

      - name: Install dependencies
        run: pip install --upgrade aiohttp uvloop

      # Write URLs to a file — avoids ALL shell quoting/ampersand issues
      - name: Build urls.txt
        run: |
          python - << 'EOF'
          import os

          ids  = os.environ.get("VIDEO_IDS", "280").split()
          raw  = os.environ.get("RAW_URLS", "")

          lines = []
          for vid in ids:
              vid = vid.strip()
              if vid:
                  lines.append(f"https://multiembed.mov/?video_id={vid}&tmdb=1")
          for u in raw.splitlines():
              u = u.strip()
              if u:
                  lines.append(u)

          if not lines:
              lines.append("https://multiembed.mov/?video_id=280&tmdb=1")

          with open("urls.txt", "w") as f:
              f.write("\n".join(lines) + "\n")

          print("URLs to resolve:")
          for l in lines:
              print(" ", l)
          EOF
        env:
          VIDEO_IDS: ${{ github.event.inputs.video_ids }}
          RAW_URLS:  ${{ github.event.inputs.raw_urls }}

      - name: Resolve embeds
        run: python fast_embed.py --urls-file urls.txt --output results.json
        continue-on-error: true

      - name: Print summary
        run: |
          echo "## Embed Resolution Results" >> "$GITHUB_STEP_SUMMARY"
          echo '```json' >> "$GITHUB_STEP_SUMMARY"
          cat results.json >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          cat results.json

      - name: Upload results
        if: ${{ github.event.inputs.output_artifact != 'false' }}
        uses: actions/upload-artifact@v4
        with:
          name: embed-results-${{ github.run_id }}
          path: results.json
          retention-days: 7
